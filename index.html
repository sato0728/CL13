<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>花畑の朝</title>
<style>
  .box {
    position: relative;
    width: 800px;
    margin: 0 auto;
  }

  .bg {
    width: 100%;
    display: block;
  }

 
  .message {
    position: absolute;
    top: 40px;
    left: 40px;
    font-size: 26px;
    color: #d22;
    font-weight: 600;
    line-height: 1.6;
    text-shadow: 0 0 4px rgba(255,255,255,0.8);
  }

  .butter {
    position: absolute;
    width: 80px;
  }

  .b1 { top: 330px; left: 150px; }  
  .b2 { top: 280px; left: 300px; }  
  .b3 { top: 360px; left: 450px; }  

  .credit {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-size: 14px;
    color: #444;
    background: rgba(255,255,255,0.7);
    padding: 4px 8px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div class="box">
  <img src="bg0.png" class="bg">

  <div class="message">
    ぽかぽか陽気の穏やかな朝<br>
    花畑では、蝶々がのんびり飛んでいます
  </div>

  <img src="butterfly.gif" class="butter b1">
  <img src="butterfly.gif" class="butter b2">
  <img src="butterfly.gif" class="butter b3">

  <div class="credit">
    このイラストは、Adobe Firefly Image 5 で生成しました
  </div>
</div>

</body>
</html>
